name: my_diary
description: "A premium daily diary application with encrypted journaling."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # HTTP & Networking
  dio: ^5.7.0
  
  # State Management
  provider: ^6.1.2
  
  # Routing
  go_router: ^14.8.1
  
  # Calendar
  table_calendar: ^3.2.0
  
  # Rich Text Editor
  flutter_quill: ^11.1.0
  
  # Secure Storage
  flutter_secure_storage: ^9.2.4
  
  # Image Handling
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  cached_network_image: ^3.4.1
  
  # UI Enhancement
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  
  # Date Formatting
  intl: ^0.20.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
